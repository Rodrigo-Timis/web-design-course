<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Number Guessing Game</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
	<style>
		:root {
			--bg-night: #120224;
			--bg-deep: #1d063b;
			--neon-pink: #ff4fd8;
			--neon-cyan: #37f7ff;
			--neon-yellow: #ffe45c;
			--panel: rgba(16, 10, 42, 0.72);
			--panel-border: rgba(55, 247, 255, 0.45);
			--text-main: #f7f2ff;
			--text-soft: #c7bde6;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 24px;
			font-family: "Orbitron", sans-serif;
			color: var(--text-main);
			background:
				radial-gradient(circle at top, rgba(255, 79, 216, 0.2), transparent 30%),
				linear-gradient(180deg, rgba(255, 109, 214, 0.08), transparent 35%),
				linear-gradient(0deg, rgba(55, 247, 255, 0.14), transparent 40%),
				linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-night) 58%, #05010d 100%);
			overflow: hidden;
		}

		body::before {
			content: "";
			position: fixed;
			inset: 0;
			background:
				linear-gradient(transparent 0 92%, rgba(255, 255, 255, 0.08) 92% 100%),
				linear-gradient(90deg, transparent 0 49.5%, rgba(55, 247, 255, 0.12) 49.5% 50.5%, transparent 50.5% 100%);
			background-size: 100% 6px, 120px 100%;
			opacity: 0.18;
			pointer-events: none;
		}

		body::after {
			content: "";
			position: fixed;
			left: 0;
			right: 0;
			bottom: -8vh;
			height: 38vh;
			background:
				linear-gradient(180deg, rgba(55, 247, 255, 0.08), rgba(55, 247, 255, 0)),
				repeating-linear-gradient(90deg, rgba(55, 247, 255, 0.6) 0 2px, transparent 2px 72px),
				repeating-linear-gradient(0deg, rgba(55, 247, 255, 0.35) 0 2px, transparent 2px 32px);
			transform: perspective(220px) rotateX(72deg);
			transform-origin: center bottom;
			box-shadow: 0 -30px 80px rgba(55, 247, 255, 0.2);
			pointer-events: none;
		}

		.game-shell {
			position: relative;
			width: min(100%, 860px);
			padding: 48px 32px;
			border: 2px solid var(--panel-border);
			border-radius: 28px;
			background: var(--panel);
			backdrop-filter: blur(12px);
			box-shadow:
				0 0 0 2px rgba(255, 79, 216, 0.18) inset,
				0 0 30px rgba(255, 79, 216, 0.26),
				0 0 60px rgba(55, 247, 255, 0.18);
			text-align: center;
		}

		.game-shell::before,
		.game-shell::after {
			content: "";
			position: absolute;
			border-radius: 999px;
			filter: blur(10px);
			opacity: 0.8;
		}

		.game-shell::before {
			width: 140px;
			height: 140px;
			top: -24px;
			left: -24px;
			background: rgba(255, 79, 216, 0.22);
		}

		.game-shell::after {
			width: 180px;
			height: 180px;
			right: -36px;
			bottom: -24px;
			background: rgba(55, 247, 255, 0.2);
		}

		h1 {
			margin: 0;
			font-family: "Press Start 2P", cursive;
			font-size: clamp(2rem, 5vw, 4.4rem);
			line-height: 1.15;
			text-transform: uppercase;
			color: #fff3ff;
			text-shadow:
				0 0 5px rgba(255, 255, 255, 0.75),
				0 0 12px rgba(255, 79, 216, 0.45),
				0 0 22px rgba(55, 247, 255, 0.25);
		}

		.subtitle {
			margin: 18px auto 0;
			max-width: 640px;
			font-size: 1rem;
			line-height: 1.8;
			letter-spacing: 0.08em;
			color: var(--text-soft);
		}

		.rules {
			display: grid;
			grid-template-columns: repeat(3, minmax(0, 1fr));
			gap: 14px;
			margin: 30px 0 34px;
		}

		.rule-card {
			padding: 16px 14px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			border-radius: 18px;
			background: rgba(255, 255, 255, 0.04);
			box-shadow: inset 0 0 16px rgba(255, 255, 255, 0.04);
		}

		.rule-label {
			display: block;
			font-size: 0.7rem;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: var(--neon-cyan);
			margin-bottom: 8px;
		}

		.rule-value {
			font-size: 1.1rem;
			font-weight: 700;
			color: var(--text-main);
		}

		.start-button {
			padding: 18px 34px;
			border: 0;
			border-radius: 999px;
			font-family: "Press Start 2P", cursive;
			font-size: 0.95rem;
			line-height: 1.4;
			text-transform: uppercase;
			color: #fff4ff;
			background: linear-gradient(90deg, #ff78e1, #ff4fd8, #ff2db7);
			box-shadow:
				0 0 0 3px rgba(255, 255, 255, 0.08),
				0 0 24px rgba(255, 79, 216, 0.52),
				0 12px 30px rgba(0, 0, 0, 0.35);
			cursor: pointer;
			transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
		}

		.start-button:hover {
			transform: translateY(-3px) scale(1.02);
			box-shadow:
				0 0 0 3px rgba(255, 255, 255, 0.12),
				0 0 28px rgba(255, 79, 216, 0.65),
				0 18px 34px rgba(0, 0, 0, 0.4);
			filter: saturate(1.08);
		}

		.start-button:active {
			transform: translateY(0) scale(0.99);
		}

		.modal-overlay {
			position: fixed;
			inset: 0;
			display: grid;
			place-items: center;
			padding: 24px;
			background: rgba(5, 1, 13, 0.7);
			backdrop-filter: blur(8px);
			z-index: 10;
		}

		.modal-overlay[hidden] {
			display: none;
		}

		.modal-card {
			width: min(100%, 420px);
			padding: 28px 24px;
			border: 1px solid rgba(255, 79, 216, 0.45);
			border-radius: 24px;
			background: rgba(20, 7, 44, 0.96);
			box-shadow: 0 0 24px rgba(255, 79, 216, 0.28), 0 0 50px rgba(55, 247, 255, 0.12);
			text-align: center;
		}

		.modal-title {
			margin: 0 0 14px;
			font-family: "Press Start 2P", cursive;
			font-size: 1rem;
			line-height: 1.5;
			color: #fff3ff;
			text-align: center;
		}

		.modal-message {
			margin: 0 0 18px;
			font-size: 0.92rem;
			line-height: 1.8;
			letter-spacing: 0.05em;
			color: var(--text-soft);
			text-align: center;
		}

		.modal-input {
			width: 100%;
			padding: 14px 16px;
			border: 1px solid rgba(55, 247, 255, 0.35);
			border-radius: 14px;
			background: rgba(255, 255, 255, 0.06);
			font: inherit;
			font-size: 1rem;
			color: var(--text-main);
			text-align: center;
			outline: none;
		}

		.modal-input:focus {
			border-color: rgba(255, 79, 216, 0.7);
			box-shadow: 0 0 0 3px rgba(255, 79, 216, 0.16);
		}

		.modal-actions {
			display: flex;
			justify-content: center;
			gap: 12px;
			margin-top: 18px;
			flex-wrap: wrap;
		}

		.modal-button {
			min-width: 140px;
			padding: 14px 18px;
			border: 0;
			border-radius: 999px;
			font-family: "Orbitron", sans-serif;
			font-size: 0.85rem;
			font-weight: 700;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			cursor: pointer;
			color: #fff4ff;
			background: linear-gradient(90deg, #ff78e1, #ff4fd8, #ff2db7);
			box-shadow: 0 0 18px rgba(255, 79, 216, 0.3);
		}

		.modal-button-secondary {
			background: rgba(255, 255, 255, 0.08);
			border: 1px solid rgba(255, 255, 255, 0.12);
			box-shadow: none;
		}

		@keyframes glowPulse {
			0%,
			100% {
				box-shadow:
					0 0 0 2px rgba(255, 79, 216, 0.18) inset,
					0 0 30px rgba(255, 79, 216, 0.26),
					0 0 60px rgba(55, 247, 255, 0.18);
			}

			50% {
				box-shadow:
					0 0 0 2px rgba(55, 247, 255, 0.28) inset,
					0 0 40px rgba(255, 79, 216, 0.36),
					0 0 80px rgba(55, 247, 255, 0.26);
			}
		}

		.game-shell {
			animation: glowPulse 3.2s ease-in-out infinite;
		}

		@media (max-width: 700px) {
			.game-shell {
				padding: 36px 20px;
			}

			.rules {
				grid-template-columns: 1fr;
			}

			.start-button,
			.modal-button {
				width: 100%;
				font-size: 0.82rem;
			}
		}
	</style>
</head>
<body>
	<main class="game-shell">
		<h1>Number Guessing Game</h1>
		<p class="subtitle">
			Jack into the synthwave grid, hit start, and try to guess the hidden number between 1 and 10 before your 3 tries burn out.
		</p>

		<section class="rules" aria-label="Game rules">
			<div class="rule-card">
				<span class="rule-label">Range</span>
				<span class="rule-value">1 to 10</span>
			</div>
			<div class="rule-card">
				<span class="rule-label">Attempts</span>
				<span class="rule-value">3 shots</span>
			</div>
			<div class="rule-card">
				<span class="rule-label">Mission</span>
				<span class="rule-value">Guess Right!</span>
			</div>
		</section>

		<button type="button" class="start-button" onclick="startGame()">Start Game</button>
	</main>

	<div class="modal-overlay" id="modalOverlay" hidden>
		<div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
			<h2 class="modal-title" id="modalTitle"></h2>
			<p class="modal-message" id="modalMessage"></p>
			<input class="modal-input" id="modalInput" type="number" min="1" max="10" inputmode="numeric" hidden>
			<div class="modal-actions">
				<button type="button" class="modal-button modal-button-secondary" id="modalCancelButton">Cancel</button>
				<button type="button" class="modal-button" id="modalConfirmButton">Confirm</button>
			</div>
		</div>
	</div>

	<script src="script.js"></script>
</body>
</html>
